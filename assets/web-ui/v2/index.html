<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>SPX Control Panel</title>
        <script>
        (() => {
            let m = window.location.href.match(/SPX_KEY=([^&]+)/);
            if (!m) {
                return;
            }

            document.cookie = 'SPX_KEY=' + m[1] + '; expires=Thu, 31 Dec 2037 23:59:59 UTC; path=/';

            window.location.replace(window.location.href.replace(/\?.*/, '?SPX_UI_URI=/'));
        })();
        </script>
        <link rel="stylesheet" href="?SPX_UI_URI=/v2/css/main.css">
    </head>
    <body>
        <h1>SPX Control Panel</h1>

        <details>
            <summary>Configuration</summary>
            <form id="config">
                <fieldset></fieldset>
            </form>
        </details>

        <div id="reports"></div>

        <script type="module" crossorigin>
            import {utils, fmt, reportExporter, dataTable} from './?SPX_UI_URI=/v2/js/spx.js';

            const {setCookieVar, getCookieVar} = utils;
            const {makeDataTable} = dataTable;

            document.addEventListener("DOMContentLoaded", () => {
                fetch('?SPX_UI_URI=/data/metrics', {credentials: "same-origin"})
                    .then(response => response.json())
                    .then(response => {
                        const metrics = response.results;

                        const parameters = [
                            {
                                key: 'SPX_ENABLED',
                                label: 'Enabled',
                                type: 'switch',
                                defaultValue: '0',
                                description: 'Whether to enable SPX profiler for your current browser session. No performance impact for other clients.',
                            },
                            {
                                key: 'SPX_AUTO_START',
                                label: 'Automatic start',
                                type: 'switch',
                                defaultValue: '1',
                                description: 'Whether to enable SPX profiler\'s automatic start. When automatic start is disabled, you have to start & stop profiling on your own at runtime via the `spx_profiler_start()` & `spx_profiler_stop()` functions.',
                            },
                            {
                                key: 'SPX_BUILTINS',
                                label: 'Profile internal functions',
                                type: 'switch',
                                defaultValue: '0',
                                description: 'Whether to profile internal functions. It is not recommended to profile internal functions if you want to accurately find a time bottleneck.',
                            },
                            {
                                key: 'SPX_SAMPLING_PERIOD',
                                label: 'Sampling',
                                type: 'choice',
                                choice: {
                                    multi: false,
                                    values: [
                                        {key: '0',    label: 'Disabled'},
                                        {key: '5',    label: '5us'},
                                        {key: '10',   label: '10us'},
                                        {key: '20',   label: '20us'},
                                        {key: '50',   label: '50us'},
                                        {key: '100',  label: '100us'},
                                        {key: '200',  label: '200us'},
                                        {key: '500',  label: '500us'},
                                        {key: '1000', label: '1ms'},
                                        {key: '2000', label: '2ms'},
                                        {key: '5000', label: '5ms'},
                                    ],
                                },
                                defaultValue: '0',
                                description: 'Whether to collect data for the current call stack at regular intervals according to the specified sampling period. The result will usually be less accurate but in some cases it could be far more accurate by not over-evaluating small functions called many times. It is recommended to try sampling (with different periods) if you want to accurately find a time bottleneck. When profiling a long running & CPU intensive script, this option will also allow you to contain report size and thus keeping it small enough to be exploitable through the analysis screen.',
                            },
                            {
                                key: 'SPX_DEPTH',
                                label: 'Max profiling depth',
                                type: 'choice',
                                choice: {
                                    multi: false,
                                    values: Array
                                        .from(Array(10).keys(), e => e != 0 ? e : Number.POSITIVE_INFINITY)
                                        .sort()
                                        .reverse()
                                        .map(e => e == Number.POSITIVE_INFINITY ? 0 : e)
                                        .map(e => ({
                                            key: '' + e,
                                            label: '' + (e == 0 ? 'Unlimited' : e),
                                        }))
                                    ,
                                },
                                defaultValue: '0',
                                description: 'The stack depth at which profiling must stop (i.e. aggregate measures of deeper calls).',
                            },
                            {
                                key: 'SPX_METRICS',
                                label: 'Additional metrics',
                                type: 'choice',
                                choice: {
                                    multi: true,
                                    values: metrics
                                        .filter(e => e.key != 'wt' && e.key != 'zm')
                                        .map(e => ({
                                            key: e.key,
                                            label: e.name,
                                        }))
                                    ,
                                },
                                defaultValue: '',
                                description: 'List of available metrics to collect in addition to Wall time and Zend Engine memory usage. It is not recommended to collect additional metrics if you want to accurately find a time bottleneck.',
                            },
                        ];

                        let fieldSet = document.querySelector('#config > fieldset');
                        parameters.forEach(parameter => {
                            let parameterHtml = `
                                <div class="form-row">
                                    <label for="${parameter.key}">${parameter.label}</label>
                            `;

                            switch (parameter.type) {
                                case 'switch':
                                    parameterHtml += `<input id="${parameter.key}" type="checkbox" class="switch">`;

                                    break;

                                case 'choice':
                                    let size = Math.max(5, parseInt(parameter.choice.values.length * 0.7));

                                    parameterHtml += `
                                        <select
                                            id="${parameter.key}"
                                            ${
                                                parameter.choice.multi ?
                                                    'multiple size="' + size + '"'
                                                    : ''
                                            }>
                                    `;

                                    parameter.choice.values.forEach(e => {
                                        parameterHtml += `<option value="${e.key}">${e.label}</option>`;
                                    });

                                    parameterHtml += '</select>';

                                    break;
                            }

                            parameterHtml += `<em>${parameter.description}</em></div>`;

                            fieldSet.insertAdjacentHTML(
                                'beforeend',
                                parameterHtml
                            );
                        });

                        fieldSet.insertAdjacentHTML(
                            'beforeend',
                            `
                            <div class="form-row">
                                <label for="cli-prefix">Command line prefix</label>
                                <textarea id="cli-prefix" rows="2" cols="80" readonly></textarea>
                                <em>Add this text before each PHP script execution command to enable the profiler with the configuration defined above.</em>
                            </div>
                            `
                        );

                        parameters.forEach(parameter => {
                            let value = getCookieVar(parameter.key) || parameter.defaultValue;
                            switch (parameter.type) {
                                case 'switch':
                                    document.getElementById(parameter.key).checked = value !== '0';

                                    break;

                                case 'choice':
                                    document
                                        .querySelectorAll(`#${parameter.key} > option`)
                                        .forEach(e => {
                                            e.selected = false;
                                        })
                                    ;

                                    value.split(',').forEach(e => {
                                        const option = document.querySelector(
                                            `#${parameter.key} option[value="${e}"]`
                                        );

                                        if (option) {
                                            option.selected = true;
                                        }
                                    });

                                    break;
                            }
                        });

                        ['click', 'change', 'focusout'].forEach(eventType => {
                            document.getElementById('config').addEventListener(eventType, (event) => {
                                let cliParameters = [];
                                parameters.forEach(parameter => {
                                    let value = null;

                                    switch (parameter.type) {
                                        case 'switch':
                                            value = document.getElementById(parameter.key).checked ? '1' : '0';

                                            break;

                                        case 'choice':
                                            const values = Array.from(
                                                document.getElementById(parameter.key).selectedOptions
                                            )
                                                .map(option => option.value)
                                            ;

                                            value = values.join(',');

                                            break;
                                    }

                                    setCookieVar(parameter.key, value);
                                    if (value != parameter.defaultValue || parameter.key === 'SPX_ENABLED') {
                                        cliParameters.push(parameter.key + '=' + value);
                                    }

                                    if (parameter.key === 'SPX_ENABLED') {
                                        cliParameters.push('SPX_REPORT=full');
                                    }
                                });

                                document.getElementById('cli-prefix').value = cliParameters.join(' ');
                            });
                        });

                        document.getElementById('config').dispatchEvent(new Event('focusout', { bubbles: true }));

                        return fetch('?SPX_UI_URI=/data/reports/metadata', {credentials: "same-origin"});
                    })
                    .then(response => response.json())
                    .then(data => {
                        makeDataTable(
                            'reports',
                            {
                                makeRowUrl: row => '?SPX_UI_URI=/v2/report.html&key=' + row.key,
                                columns: [
                                    {
                                        label: 'Date',
                                        value: 'exec_ts',
                                        format: value => fmt.date(new Date(value * 1000)),
                                    },
                                    {
                                        label: 'HTTP Host',
                                        cssClass: 'breakable-text',
                                        value: 'http_host',
                                    },
                                    {
                                        label: 'Request / Command',
                                        cssClass: 'breakable-text',
                                        value: row => row.cli ? row.cli_command_line
                                            : row.http_method + ' ' + row.http_request_uri,
                                    },
                                    {
                                        label: 'Host',
                                        cssClass: 'breakable-text',
                                        value: 'host_name',
                                    },
                                    {
                                        label: 'Custom metadata',
                                        cssClass: 'breakable-text',
                                        value: 'custom_metadata_str',
                                    },
                                    {
                                        label: 'Wall time',
                                        value: 'wall_time_ms',
                                        format: value => fmt.time(value * 1000),
                                    },
                                    {
                                        label: 'Memory',
                                        value: 'peak_memory_usage',
                                        format: value => fmt.memory(value),
                                    },
                                    {
                                        label: 'Metrics',
                                        value: 'enabled_metrics',
                                        format: value => value.join(', '),
                                    },
                                    {
                                        label: 'Recorded calls',
                                        value: 'recorded_call_count',
                                        format: value => fmt.quantity(value),
                                    },
                                ],
                                rowActions: [
                                    {
                                        label: '⬇ callgrind',
                                        title: 'Export as callgrind',
                                        handler: row => reportExporter.exportCallgrind(row.key),
                                    },
                                    {
                                        label: '🗑️',
                                        title: 'Delete this report',
                                        href: row => `?SPX_UI_URI=/data/reports/delete/${row.key}`,
                                        confirm: () => ({
                                            title: 'Do you want to delete this SPX report?',
                                            message: 'This action cannot be undone.',
                                            confirmLabel: 'Delete',
                                            cancelLabel: 'No'
                                        }),
                                        onSuccess: (row, container) => {
                                            container.querySelector(`#row-${row.key}`).remove();
                                            if (container.querySelectorAll('tbody tr').length === 0) {
                                                container.querySelectorAll('tfoot').forEach(el => { el.innerHTML = ''; });
                                            }
                                        },
                                    }
                                ],
                                tableActions: [
                                    {
                                        label: '🗑️ Delete all reports',
                                        href: '?SPX_UI_URI=/data/reports/delete_all',
                                        confirm: () => ({
                                            title: 'Do you want to delete all the SPX reports?',
                                            message: 'This action cannot be undone.',
                                            confirmLabel: 'Delete',
                                            cancelLabel: 'No',
                                        }),
                                        onSuccess: (container) => {
                                            container.querySelectorAll('tbody').forEach(el => { el.innerHTML = ''; });
                                            container.querySelectorAll('.data_table-toolbar').forEach(el => { el.innerHTML = ''; });
                                        },
                                    }
                                ],
                            },
                            data.results
                        );
                    })
                ;
            });
        </script>
    </body>
</html>
